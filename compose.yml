name: stallworks-system

services:
  user-db:
    image: postgres:16
    container_name: user-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
    ports:
      - "5433:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data

  branch-db:
    image: postgres:16
    container_name: branch-db
    environment:
      POSTGRES_DB: branch_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - branch_db_data:/var/lib/postgresql/data

  sales-db:
    image: postgres:16
    container_name: sales-db
    environment:
      POSTGRES_DB: sales_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - sales_db_data:/var/lib/postgresql/data

  inventory-db:
    image: postgres:16
    container_name: inventory-db
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - inventory_db_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - user-db
      - branch-db
      - sales-db
      - inventory-db

  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    profiles: ["apps"]
    depends_on:
      - auth-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/auth_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8081:8080"

  branch-service:
    build:
      context: ./branch-service
    container_name: branch-service
    profiles: ["apps"]
    depends_on:
      - branch-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://branch-db:5432/branch_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8082:8080"

  inventory-service:
    build:
      context: ./inventory-service
    container_name: inventory-service
    profiles: ["apps"]
    depends_on:
      - inventory-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://inventory-db:5432/inventory_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8083:8080"

  sales-service:
    build:
      context: ./sales-service
    container_name: sales-service
    profiles: ["apps"]
    depends_on:
      - sales-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://sales-db:5432/sales_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8084:8080"

volumes:
  user_db_data:
  branch_db_data:
  sales_db_data:
  inventory_db_data:
  notification_db_data:
  pgadmin-data: